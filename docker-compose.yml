# Mindr — one-command local setup
#
# Default (SQLite + local Ollama embeddings, zero API keys, fully offline):
#   docker compose up -d
#   mindr init     # in your project
#
# With self-hosted Remembr backend (optional cloud memory store):
#   docker compose --profile remembr up -d
#   # Then set storage.backend = "remembr" in .mindr/config.toml
#   # and remembr.base_url = "http://localhost:8000/api/v1"
#
# Run the Mindr CLI from the same compose stack:
#   docker compose --profile mindr run --rm mindr --help

name: mindr

services:
  # ---------------------------------------------------------------------------
  # Mindr CLI - optional containerized CLI for running Mindr against this stack
  # ---------------------------------------------------------------------------
  mindr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindr-cli
    profiles: ["mindr"]
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      MINDR_REMEMBR_BASE_URL: http://remembr:8000/api/v1
      MINDR_OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Ollama — local embedding model (nomic-embed-text, ~270 MB)
  # Always started. Mindr uses it for semantic search without any API key.
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: mindr-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # One-shot: pull the embedding model on first start
  # ---------------------------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    container_name: mindr-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    restart: on-failure

  # ---------------------------------------------------------------------------
  # PostgreSQL — backing store for self-hosted Remembr
  # Only started with: docker compose --profile remembr up -d
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mindr-postgres
    profiles: ["remembr"]
    environment:
      POSTGRES_DB: remembr
      POSTGRES_USER: mindr
      POSTGRES_PASSWORD: mindr
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindr"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Remembr — self-hosted memory API
  # Only started with: docker compose --profile remembr up -d
  # After starting, set in .mindr/config.toml:
  #   [storage]
  #   backend = "remembr"
  #   [remembr]
  #   base_url = "http://localhost:8000/api/v1"
  # ---------------------------------------------------------------------------
  remembr:
    image: ghcr.io/emartai/remembr:latest
    container_name: mindr-remembr
    profiles: ["remembr"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mindr:mindr@postgres:5432/remembr
      SECRET_KEY: change-me-in-production
      EMBEDDING_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  pg_data:
